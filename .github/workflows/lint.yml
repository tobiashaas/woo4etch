name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'plugin/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'plugin/**'
      - '.github/workflows/lint.yml'

permissions:
  contents: read

jobs:
  php-syntax:
    name: PHP ${{ matrix.php }} syntax
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest supported (Requires PHP: 7.4) through current stable.
        php: ['7.4', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
          coverage: none

      - name: Lint all plugin PHP files
        run: |
          find plugin/woo4etch -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
